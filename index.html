<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librodiario — Il mio Archivio Letterario</title>
    <style>
        :root {
            --bg-main: #fcfbfa;
            --bg-card: #ffffff;
            --text-main: #2c2623;
            --text-muted: #6e6560;
            --primary: #5c4033;
            --primary-light: #8b6c5c;
            --accent: #d4af37;
            --border: #e8e5e2;
            --danger: #ae2012;
            --shadow: 0 4px 20px rgba(92, 64, 51, 0.06);
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--primary);
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Layout */
        .layout {
            display: flex;
            gap: 40px;
        }

        .sidebar {
            flex: 1;
            min-width: 340px;
            position: sticky;
            top: 20px;
            height: fit-content;
        }

        .content {
            flex: 2;
        }

        /* Card */
        .card {
            background-color: var(--bg-card);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .card-title {
            font-size: 1.25rem;
            color: var(--primary);
            margin-bottom: 20px;
            font-weight: 700;
        }

        /* Moduli e Input */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: #faf9f8;
            color: var(--text-main);
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-light);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(139, 108, 92, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button.btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button.btn:hover {
            background-color: var(--primary-light);
        }

        /* Contatore e Badge Autori */
        .stats-badge {
            display: inline-block;
            padding: 4px 10px;
            background-color: var(--border);
            color: var(--primary);
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-left: 8px;
        }

        .author-tag {
            display: inline-block;
            padding: 6px 12px;
            background-color: #f0edea;
            color: var(--text-main);
            border-radius: 6px;
            font-size: 0.85rem;
            margin: 4px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .author-tag:hover, .author-tag.active {
            background-color: var(--primary-light);
            color: #ffffff;
        }

        .clear-filter {
            display: block;
            text-align: right;
            font-size: 0.85rem;
            color: var(--danger);
            cursor: pointer;
            margin-top: 10px;
            text-decoration: underline;
        }

        /* Lista Recensioni */
        .review-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .review-card {
            background-color: var(--bg-card);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 20px;
            position: relative;
            transition: transform 0.2s ease;
        }

        .review-card:hover {
            transform: translateY(-2px);
        }

        .review-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .book-title {
            font-size: 1.4rem;
            color: var(--primary);
            font-weight: 700;
            line-height: 1.3;
        }

        .book-author {
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .stars {
            color: var(--accent);
            font-size: 1.1rem;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        .review-text {
            font-size: 1rem;
            color: var(--text-main);
            white-space: pre-line;
        }

        .review-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #f7f5f3;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .delete-btn:hover {
            background-color: #fdf0ed;
        }

        /* Responsive */
        @media (max-width: 850px) {
            .layout { flex-direction: column; }
            .sidebar { position: static; width: 100%; min-width: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📚 Il Mio Librodiario</h1>
        <p>Archivia, vota e organizza le tue letture personali</p>
    </header>

    <div class="layout">
        <div class="sidebar">
            <div class="card">
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="search">Cerca nel diario</label>
                    <input type="text" id="search" placeholder="Cerca per titolo, autore o testo...">
                </div>
            </div>

            <div class="card">
                <h2 class="card-title">Nuova Recensione</h2>
                <form id="reviewForm">
                    <div class="form-group">
                        <label for="title">Titolo del libro</label>
                        <input type="text" id="title" required placeholder="Es. Il Nome della Rosa">
                    </div>
                    <div class="form-group">
                        <label for="author">Autore</label>
                        <input type="text" id="author" required placeholder="Es. Umberto Eco">
                    </div>
                    <div class="form-group">
                        <label for="rating">Valutazione</label>
                        <select id="rating">
                            <option value="5">⭐⭐⭐⭐⭐ (Eccellente)</option>
                            <option value="4">⭐⭐⭐⭐ (Molto Buono)</option>
                            <option value="3">⭐⭐⭐ (Sufficiente)</option>
                            <option value="2">⭐⭐ (Deludente)</option>
                            <option value="1">⭐ (Pessimo)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="review">La tua recensione</label>
                        <textarea id="review" required placeholder="Cosa ne pensi di questo libro?"></textarea>
                    </div>
                    <button type="submit" class="btn">Salva nel Diario</button>
                </form>
            </div>

            <div class="card" id="authorsFilterCard" style="display: none;">
                <h2 class="card-title">Sfoglia per Autore</h2>
                <div id="authorsContainer"></div>
                <span class="clear-filter" id="clearAuthorFilter" style="display: none;">Azzera filtro autore</span>
            </div>
        </div>

        <div class="content">
            <div class="review-list-header">
                <h2 style="color: var(--primary); font-size: 1.5rem;">Cronologia Letture <span id="reviewCount" class="stats-badge">0</span></h2>
            </div>
            <div id="reviewsContainer"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
