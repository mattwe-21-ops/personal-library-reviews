<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Mio Blog Letterario</title>
    <style>
        :root {
            --bg-main: #fcfbfa;
            --bg-card: #ffffff;
            --text-main: #2c2623;
            --primary: #1a1a1a;
            --border: #e8e5e2;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            --radius: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        header h1 { font-size: 2.5rem; color: var(--primary); margin-bottom: 10px; }
        
        .controls { display: flex; flex-direction: column; gap: 15px; margin-bottom: 40px; }
        .search-bar { width: 100%; padding: 15px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 1rem; box-shadow: var(--shadow); outline: none; }
        
        .blog-posts { display: flex; flex-direction: column; gap: 40px; }
        .post-card { background-color: var(--bg-card); border-radius: var(--radius); padding: 35px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        
        /* Forziamo gli stili grafici originali del file .doc */
        .post-card h1 { font-size: 18pt !important; margin-bottom: 20px !important; border-bottom: 2px solid #000 !important; padding-bottom: 10px !important; color: #000 !important; text-align: center !important; }
        .post-card table { width: 100% !important; border-collapse: collapse !important; margin-bottom: 20px !important; }
        .post-card td { padding: 8px !important; border-bottom: 1px solid #eeeeee !important; vertical-align: top !important; }
        .post-card td.label { font-weight: bold !important; width: 35% !important; color: #000 !important; }
        .post-card .section-title { font-weight: bold !important; color: #000 !important; margin-top: 25px !important; margin-bottom: 10px !important; border-bottom: 1px solid #000 !important; padding-bottom: 3px !important; text-transform: uppercase !important; font-size: 11pt !important; }
        .post-card .text-block { background-color: #f8fafc !important; padding: 12px !important; border-left: 4px solid #000 !important; margin-bottom: 15px !important; white-space: pre-wrap !important; }
        .post-card .footer-signature { margin-top: 50px !important; text-align: right !important; font-style: italic !important; font-size: 11pt !important; border-top: 1px dashed #cccccc !important; padding-top: 10px !important; }
        
        .refresh-btn { background: #0066cc; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 0.95rem; margin-top: 10px; font-weight: 600; }
        .refresh-btn:hover { background: #0052a3; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📖 Rifugio Letterario</h1>
        <p>Bacheca pubblica delle mie recensioni</p>
        <button class="refresh-btn" onclick="loadReviewsFromGitHub()">🔄 Aggiorna e Forza Caricamento</button>
    </header>

    <div class="controls">
        <input type="text" id="searchBar" class="search-bar" placeholder="Cerca titolo, autore, trama...">
    </div>

    <main id="blogPostsContainer" class="blog-posts">
        <p style="text-align:center; color:#6e6560; padding: 40px;">Caricamento delle recensioni in corso...</p>
    </main>
</div>

<script>
    const GITHUB_USER = "mattwe-21-ops"; 
    const GITHUB_REPO = "personal-library-reviews";

    let reviews = [];

    const blogPostsContainer = document.getElementById('blogPostsContainer');
    const searchBar = document.getElementById('searchBar');

    searchBar.addEventListener('input', renderBlog);

    async function loadReviewsFromGitHub() {
        reviews = [];
        blogPostsContainer.innerHTML = `<p style="text-align:center; color:#6e6560; padding: 40px;">Connessione sicura a GitHub...</p>`;
        
        try {
            const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/recensioni`;
            let response = await fetch(url);
            
            // Se GitHub applica il blocco temporaneo (Rate Limit), passiamo alla lettura tramite i file raw diretti
            if (!response.ok) {
                throw new Error(`GitHub ha temporaneamente rallentato le richieste (Codice ${response.status}). Attendi un minuto e premi il tasto blu in alto per forzare.`);
            }
            
            const files = await response.json();
            const fileEntries = files.filter(f => f.type === 'file' && !f.name.startsWith('.'));

            if (fileEntries.length === 0) {
                blogPostsContainer.innerHTML = `<p style="text-align:center; color:#6e6560; padding: 40px;">Nessun file trovato nella cartella recensioni.</p>`;
                return;
            }

            for (let file of fileEntries) {
                // Utilizziamo l'indirizzo grezzo raw bypassando del tutto le API e i blocchi
                const rawUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/recensioni/${file.name}`;
                const fileRes = await fetch(rawUrl);
                if (!fileRes.ok) continue;
                
                let fileContent = await fileRes.text();

                const bodyMatch = fileContent.match(/<body>([\s\S]*?)<\/body>/i);
                let cleanHTML = bodyMatch ? bodyMatch[1] : fileContent;

                reviews.push({ htmlContent: cleanHTML });
            }

            reviews.reverse(); 
            renderBlog();
            
        } catch (err) {
            blogPostsContainer.innerHTML = `
                <div style="text-align:center; padding: 40px;">
                    <p style="color:#ae2012; font-weight: bold; margin-bottom: 15px;">⚠️ ${err.message}</p>
                    <p style="font-size: 0.9rem; color: #555;">I tuoi file sono comunque al sicuro su GitHub! Il blocco automatico svanirà a breve.</p>
                </div>`;
        }
    }

    function renderBlog() {
        const searchText = searchBar.value.toLowerCase();
        blogPostsContainer.innerHTML = '';

        const filtered = reviews.filter(r => {
            const textContent = r.htmlContent.replace(/<\/?[^>]+(>|$)/g, "").toLowerCase();
            return textContent.includes(searchText);
        });

        if (filtered.length === 0) {
            blogPostsContainer.innerHTML = `<p style="text-align:center; color:#6e6560; padding:40px;">Nessun identikit trovato.</p>`;
            return;
        }

        filtered.forEach(r => {
            const article = document.createElement('article');
            article.className = 'post-card';
            article.innerHTML = r.htmlContent;
            blogPostsContainer.appendChild(article);
        });
    }

    loadReviewsFromGitHub();
</script>
</body>
</html>
