<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Mio Blog Letterario</title>
    <style>
        :root {
            --bg-main: #fcfbfa;
            --bg-card: #ffffff;
            --text-main: #2c2623;
            --text-muted: #6e6560;
            --primary: #1a1a1a;
            --border: #e8e5e2;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            --radius: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        header h1 { font-size: 2.5rem; color: var(--primary); margin-bottom: 10px; }
        
        .controls { display: flex; flex-direction: column; gap: 15px; margin-bottom: 40px; }
        .search-bar { width: 100%; padding: 15px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 1rem; box-shadow: var(--shadow); outline: none; }
        .authors-filter { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .author-tag { background-color: #eee; padding: 6px 14px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; }
        .author-tag.active { background-color: var(--primary); color: white; }
        .clear-filter { font-size: 0.9rem; color: #ae2012; cursor: pointer; text-decoration: underline; }

        .blog-posts { display: flex; flex-direction: column; gap: 40px; }
        .post-card { background-color: var(--bg-card); border-radius: var(--radius); padding: 35px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        
        /* Stili ereditati dal tuo documento originale */
        .post-card h1 { font-size: 18pt; margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .post-card table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .post-card td { padding: 8px; border-bottom: 1px solid #eeeeee; vertical-align: top; }
        .post-card td.label { font-weight: bold; width: 35%; }
        .post-card .section-title { font-weight: bold; margin-top: 25px; margin-bottom: 10px; border-bottom: 1px solid #000; padding-bottom: 3px; text-transform: uppercase; font-size: 11pt; }
        .post-card .text-block { background-color: #f8fafc; padding: 12px; border-left: 4px solid #000; margin-bottom: 15px; white-space: pre-wrap; }
        .post-card .footer-signature { margin-top: 50px; text-align: right; font-style: italic; font-size: 11pt; border-top: 1px dashed #cccccc; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📖 Rifugio Letterario</h1>
        <p>Bacheca pubblica delle mie recensioni</p>
    </header>

    <div class="controls">
        <input type="text" id="searchBar" class="search-bar" placeholder="Cerca titolo, autore, trama...">
        <div class="authors-filter">
            <span style="font-weight: 600;">Autori:</span>
            <div id="authorsContainer" style="display: inline-flex; flex-wrap: wrap; gap: 8px;"></div>
            <span id="clearFilter" class="clear-filter" style="display: none;">Mostra tutti</span>
        </div>
    </div>

    <main id="blogPostsContainer" class="blog-posts">
        <p style="text-align:center; color:var(--text-muted);">Caricamento delle recensioni in corso...</p>
    </main>
</div>

<script>
    // ⚠️ CONFIGURA QUESTI DUE DATI COL TUO USERNAME E IL NOME DELLA REPO
    const GITHUB_USER = "IL_TUO_USERNAME_GITHUB"; 
    const GITHUB_REPO = "IL_NOME_DELLA_REPO";

    let reviews = [];
    let activeAuthor = null;

    const blogPostsContainer = document.getElementById('blogPostsContainer');
    const searchBar = document.getElementById('searchBar');
    const authorsContainer = document.getElementById('authorsContainer');
    const clearFilterBtn = document.getElementById('clearFilter');

    searchBar.addEventListener('input', renderBlog);
    clearFilterBtn.addEventListener('click', () => { activeAuthor = null; renderBlog(); });

    // Carica tutti i file dalla cartella "recensioni" di GitHub
    async function loadReviewsFromGitHub() {
        try {
            const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/recensioni`;
            const response = await fetch(url);
            if (!response.ok) throw new Error("Nessuna recensione trovata o cartella vuota.");
            
            const files = await response.json();
            
            // Filtra solo i file effettivi (esclude cartelle strane)
            const fileEntries = files.filter(f => f.type === 'file');

            for (let file of fileEntries) {
                const fileRes = await fetch(file.download_url);
                const fileContent = await fileRes.text();

                // Estrae l'HTML interno al body
                const bodyMatch = fileContent.match(/<body>([\s\S]*?)<\/body>/i);
                let cleanHTML = bodyMatch ? bodyMatch[1] : fileContent;

                // Trova l'autore per i filtri
                let author = "Sconosciuto";
                const authorMatch = cleanHTML.match(/Autore del Libro:<\/td><td>([\s\S]*?)<\/td>/i);
                if (authorMatch) {
                    author = authorMatch[1].replace(/<\/?[^>]+(>|$)/g, "").trim();
                }

                reviews.push({ author: author, htmlContent: cleanHTML });
            }

            renderBlog();
        } catch (err) {
            blogPostsContainer.innerHTML = `<p style="text-align:center; color:#ae2012;">${err.message}</p>`;
        }
    }

    function renderBlog() {
        const searchText = searchBar.value.toLowerCase();
        blogPostsContainer.innerHTML = '';

        const filtered = reviews.filter(r => {
            const textContent = r.htmlContent.replace(/<\/?[^>]+(>|$)/g, "").toLowerCase();
            return textContent.includes(searchText) && (activeAuthor ? r.author.toLowerCase() === activeAuthor.toLowerCase() : true);
        });

        if (filtered.length === 0) {
            blogPostsContainer.innerHTML = `<p style="text-align:center; color:var(--text-muted); padding:40px;">Nessuna recensione trovata.</p>`;
            return;
        }

        filtered.forEach(r => {
            const article = document.createElement('article');
            article.className = 'post-card';
            article.innerHTML = r.htmlContent;
            blogPostsContainer.appendChild(article);
        });

        renderAuthors();
    }

    function renderAuthors() {
        authorsContainer.innerHTML = '';
        const uniqueAuthors = [...new Set(reviews.map(r => r.author))].sort();

        uniqueAuthors.forEach(author => {
            const btn = document.createElement('span');
            btn.className = `author-tag ${activeAuthor === author ? 'active' : ''}`;
            btn.textContent = author;
            btn.addEventListener('click', () => {
                activeAuthor = activeAuthor === author ? null : author;
                renderBlog();
            });
            authorsContainer.appendChild(btn);
        });

        clearFilterBtn.style.display = activeAuthor ? 'inline' : 'none';
    }

    loadReviewsFromGitHub();
</script>
</body>
</html>
