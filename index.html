<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Mio Blog di Recensioni Letterarie</title>
    <style>
        :root {
            --bg-main: #fcfbfa;
            --bg-card: #ffffff;
            --text-main: #2c2623;
            --text-muted: #6e6560;
            --primary: #1a1a1a;
            --accent: #d4af37;
            --border: #e8e5e2;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            --radius: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 50px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-size: 2.8rem;
            color: var(--primary);
            font-weight: 800;
            margin-bottom: 10px;
        }

        header p { color: var(--text-muted); font-size: 1.2rem; }

        /* Controlli di Ricerca e Filtri */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .search-bar {
            width: 100%;
            padding: 15px 20px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 1rem;
            box-shadow: var(--shadow);
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar:focus { border-color: #888; }

        .authors-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .author-tag {
            background-color: #eee;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .author-tag:hover, .author-tag.active {
            background-color: var(--primary);
            color: white;
        }

        .clear-filter {
            font-size: 0.9rem;
            color: #ae2012;
            cursor: pointer;
            text-decoration: underline;
            margin-left: 10px;
        }

        /* Griglia ed Elementi del Blog */
        .blog-posts {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .post-card {
            background-color: var(--bg-card);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .post-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--border);
        }

        .post-title {
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .post-meta {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .post-meta strong { color: var(--text-main); }

        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 0.95rem;
        }

        .info-table td {
            padding: 8px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .info-table td.label {
            font-weight: bold;
            width: 30%;
            color: var(--text-muted);
        }

        .section-title {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin: 25px 0 10px 0;
            color: var(--primary);
        }

        .text-block {
            background-color: #f9f9f9;
            padding: 15px;
            border-left: 3px solid var(--primary);
            border-radius: 0 var(--radius) var(--radius) 0;
            white-space: pre-wrap;
        }

        .post-footer {
            margin-top: 30px;
            text-align: right;
            font-style: italic;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📖 Rifugio Letterario</h1>
        <p>Le mie recensioni e identikit dei libri che ho letto</p>
    </header>

    <div class="controls">
        <input type="text" id="searchBar" class="search-bar" placeholder="Cerca un libro, un autore, un genere o parole nella trama...">
        
        <div class="authors-filter">
            <span style="font-weight: 600; font-size: 0.95rem;">Filtra per autore:</span>
            <div id="authorsContainer" style="display: inline-flex; flex-wrap: wrap; gap: 8px;"></div>
            <span id="clearFilter" class="clear-filter" style="display: none;">Mostra tutti</span>
        </div>
    </div>

    <main id="blogPostsContainer" class="blog-posts">
        </main>
</div>

<script src="script.js"></script>
</body>
</html>
